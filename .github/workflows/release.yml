name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # push commit+tag, create GitHub Release

jobs:
  release:
    # The release commit itself carries [skip ci] — skip it to avoid an infinite loop
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so nx release can find the last tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Configure Git identity
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run release
        run: npx tsx tools/scripts/release.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
